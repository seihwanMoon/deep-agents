<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Editor</title>
  <link rel="stylesheet" href="/static/ui.css" />
</head>
<body>
  <div class="editor-shell">
    <header class="editor-header">
      <div>
        <h1>에이전트 편집기</h1>
        <p id="agentMeta" class="muted">JWT 입력 후 불러오기를 눌러주세요.</p>
      </div>
      <div class="token-input-wrap">
        <input id="tokenInput" type="password" placeholder="JWT 토큰 입력" />
        <button id="loadBtn">불러오기</button>
      </div>
    </header>

    <main class="editor-grid">
      <section class="settings-card editor-card">
        <h3>기본 정보</h3>
        <label>이름</label>
        <input id="nameInput" type="text" />
        <label>설명</label>
        <textarea id="descriptionInput" rows="3"></textarea>
        <label>시스템 프롬프트</label>
        <textarea id="promptInput" rows="10"></textarea>
        <div class="row-actions">
          <button id="saveAgentBtn">기본 정보 저장</button>
          <span id="saveAgentStatus" class="muted"></span>
        </div>
      </section>

      <section class="settings-card editor-card">
        <h3>설정 · 오프너 · 버전</h3>
        <label>Recursion Limit</label>
        <input id="recursionInput" type="number" min="1" max="100" />
        <label class="checkbox-row"><input id="mcpInput" type="checkbox" /> MCP 사용</label>
        <div class="row-actions">
          <button id="saveSettingsBtn">설정 저장</button>
          <span id="saveSettingsStatus" class="muted"></span>
        </div>

        <hr />
        <h4>오프너</h4>
        <textarea id="openersInput" rows="6" placeholder="한 줄에 하나씩 오프너를 입력하세요"></textarea>
        <div class="row-actions">
          <button id="saveOpenersBtn">오프너 저장</button>
          <span id="saveOpenersStatus" class="muted"></span>
        </div>

        <hr />
        <h4>최근 버전</h4>
        <ul id="versionsList" class="version-list"></ul>
        <div class="version-actions">
          <button id="refreshVersionsBtn" class="btn-secondary">버전 새로고침</button>
          <span id="versionStatus" class="muted"></span>
        </div>
        <pre id="versionDiff" class="diff-view">버전을 선택하면 변경점(diff)이 표시됩니다.</pre>
      </section>
    </main>
  </div>

  <script>
    const TOKEN_KEY = 'deep_agent_editor_jwt';
    const agentId = window.location.pathname.split('/').slice(-2, -1)[0];
    const $ = (id) => document.getElementById(id);

    const agentMeta = $('agentMeta');
    const tokenInput = $('tokenInput');
    const versionsList = $('versionsList');
    const versionDiff = $('versionDiff');

    let versionRows = [];

    tokenInput.value = window.localStorage.getItem(TOKEN_KEY) || '';

    function getToken() {
      return tokenInput.value.trim();
    }

    function setStatus(id, message) {
      $(id).textContent = message;
    }

    function parseOpeners() {
      return $('openersInput').value.split('\n').map((v) => v.trim()).filter(Boolean);
    }

    function pretty(data) {
      return JSON.stringify(data, null, 2);
    }

    async function api(path, options = {}) {
      const token = getToken();
      if (!token) throw new Error('JWT 토큰을 입력하세요.');
      const hasBody = Object.prototype.hasOwnProperty.call(options, 'body');
      const headers = { Authorization: `Bearer ${token}`, ...(options.headers || {}) };
      if (hasBody) headers['Content-Type'] = 'application/json';

      const res = await fetch(path, { ...options, headers });
      if (!res.ok) {
        let detail = res.statusText;
        try {
          const body = await res.json();
          detail = body.detail || JSON.stringify(body);
        } catch (_) {}
        throw new Error(detail);
      }
      return res.json();
    }

    async function loadVersions(prefetched = null) {
      const versions = prefetched ?? await api(`/api/v1/agents/${agentId}/versions?limit=8&include_snapshot=false`);
      versionRows = Array.isArray(versions) ? versions : (versions.items || []);

      versionsList.innerHTML = '';
      for (const item of versionRows) {
        const li = document.createElement('li');
        li.className = 'version-item';
        li.innerHTML = `
          <span>v${item.version_no} · ${new Date(item.created_at).toLocaleString()}</span>
          <span class="version-item-actions">
            <button data-action="diff" data-version="${item.version_no}" class="btn-secondary">Diff</button>
            <button data-action="restore" data-version="${item.version_no}" class="btn-danger">Restore</button>
          </span>
        `;
        versionsList.appendChild(li);
      }
      if (!versionsList.childElementCount) {
        const li = document.createElement('li');
        li.textContent = '버전이 없습니다.';
        versionsList.appendChild(li);
      }
    }

    async function loadAll() {
      const state = await api(`/api/v1/agents/${agentId}/editor-state?versions_limit=8`);
      const agent = state.agent || {};
      const settings = state.settings || {};
      const openers = state.openers || [];

      $('nameInput').value = agent.name || '';
      $('descriptionInput').value = agent.description || '';
      $('promptInput').value = agent.system_prompt || '';
      $('recursionInput').value = settings.recursion_limit ?? 25;
      $('mcpInput').checked = Boolean(settings.mcp_enabled);
      $('openersInput').value = openers.map((o) => o.content).join('\n');

      await loadVersions(state.versions || []);
      versionDiff.textContent = '버전을 선택하면 변경점(diff)이 표시됩니다.';
      agentMeta.textContent = `ID ${agent.id} · 모델 ${agent.model} · 업데이트 ${new Date(agent.updated_at).toLocaleString()}`;
    }

    async function handleLoad() {
      try {
        const token = getToken();
        if (!token) throw new Error('JWT 토큰을 입력하세요.');
        window.localStorage.setItem(TOKEN_KEY, token);
        await loadAll();
      } catch (e) {
        agentMeta.textContent = `불러오기 실패: ${e.message}`;
      }
    }

    $('loadBtn').addEventListener('click', handleLoad);
    tokenInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLoad();
    });

    $('saveAgentBtn').addEventListener('click', async () => {
      setStatus('saveAgentStatus', '저장 중...');
      try {
        await api(`/api/v1/agents/${agentId}`, {
          method: 'PUT',
          body: JSON.stringify({
            name: $('nameInput').value,
            description: $('descriptionInput').value,
            system_prompt: $('promptInput').value,
          }),
        });
        setStatus('saveAgentStatus', '저장 완료');
        await loadAll();
      } catch (e) {
        setStatus('saveAgentStatus', `실패: ${e.message}`);
      }
    });

    $('saveSettingsBtn').addEventListener('click', async () => {
      setStatus('saveSettingsStatus', '저장 중...');
      try {
        await api(`/api/v1/agents/${agentId}/settings`, {
          method: 'PUT',
          body: JSON.stringify({
            recursion_limit: Number($('recursionInput').value || 25),
            mcp_enabled: $('mcpInput').checked,
          }),
        });
        setStatus('saveSettingsStatus', '저장 완료');
        await loadAll();
      } catch (e) {
        setStatus('saveSettingsStatus', `실패: ${e.message}`);
      }
    });

    $('saveOpenersBtn').addEventListener('click', async () => {
      setStatus('saveOpenersStatus', '저장 중...');
      try {
        await api(`/api/v1/agents/${agentId}/openers`, {
          method: 'PUT',
          body: JSON.stringify({ openers: parseOpeners() }),
        });
        setStatus('saveOpenersStatus', '저장 완료');
        await loadAll();
      } catch (e) {
        setStatus('saveOpenersStatus', `실패: ${e.message}`);
      }
    });

    $('refreshVersionsBtn').addEventListener('click', async () => {
      setStatus('versionStatus', '새로고침 중...');
      try {
        await loadVersions();
        setStatus('versionStatus', '완료');
      } catch (e) {
        setStatus('versionStatus', `실패: ${e.message}`);
      }
    });

    versionsList.addEventListener('click', async (e) => {
      const target = e.target;
      if (!(target instanceof HTMLButtonElement)) return;
      const action = target.dataset.action;
      const versionNo = Number(target.dataset.version || '0');
      if (!versionNo) return;

      if (action === 'diff') {
        setStatus('versionStatus', `v${versionNo} diff 조회 중...`);
        try {
          const diff = await api(`/api/v1/agents/${agentId}/versions/${versionNo}/diff`);
          versionDiff.textContent = pretty(diff);
          setStatus('versionStatus', `v${versionNo} diff 조회 완료`);
        } catch (err) {
          setStatus('versionStatus', `실패: ${err.message}`);
        }
      }

      if (action === 'restore') {
        if (!window.confirm(`v${versionNo}으로 복원할까요?`)) return;
        setStatus('versionStatus', `v${versionNo} 복원 중...`);
        try {
          const restored = await api(`/api/v1/agents/${agentId}/versions/${versionNo}/restore`, { method: 'POST' });
          versionDiff.textContent = pretty(restored);
          await loadAll();
          setStatus('versionStatus', `v${versionNo} 복원 완료`);
        } catch (err) {
          setStatus('versionStatus', `실패: ${err.message}`);
        }
      }
    });
  </script>
</body>
</html>
